name: Rollback

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Emergency redeploy to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Rollback triggered — redeploying current main to HF Spaces"
          pip install huggingface_hub
          python scripts/sync_to_hf.py

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment Rollback Triggered',
              body: `A deployment rollback was triggered at ${new Date().toISOString()}.

            **Reason:** Manual rollback via workflow_dispatch.

            **Action Required:**
            1. Check the [deploy workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions)
            2. Verify the live URL: https://huggingface.co/spaces/polittdj/WCAG-2-1-AA-Conversion-and-Verification-Tool-v3
            3. Run scripts/smoke_test.py against the live URL

            See ROLLBACK.md for the full procedure.`,
              labels: ['deployment', 'urgent']
            });
