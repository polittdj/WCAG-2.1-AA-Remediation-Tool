name: Rollback

on:
  workflow_dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Rollback
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Rollback triggered due to failed smoke test"
          # Render automatically maintains previous deployments
          # Manual rollback can be done via Render dashboard
          echo "Please manually rollback via Render dashboard if automatic rollback fails"

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment Rollback Triggered',
              body: `A deployment rollback was triggered at ${new Date().toISOString()}.

              **Reason:** Smoke test failed after deployment.

              **Action Required:**
              1. Check the [deploy workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions)
              2. Verify the live URL is operational
              3. If still broken, manually rollback via Render dashboard

              See ROLLBACK.md for the full procedure.`,
              labels: ['deployment', 'urgent']
            });
